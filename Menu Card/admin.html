<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Foodie Admin | Manage Deliciousness</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-page { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .dashboard-header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
        .admin-main { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .form-card { position: sticky; top: 100px; height: fit-content; }
        .table-card { background: var(--bg-light); border-radius: var(--border-radius-lg); padding: 25px; box-shadow: var(--shadow-soft); overflow: hidden; }
        .img-preview-box { width: 100%; height: 150px; border-radius: 12px; background: #eee; margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed #ccc; }
        .img-preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .admin-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .admin-table th { padding: 15px; text-align: left; color: var(--text-muted); font-weight: 600; }
        .admin-table tr { background: var(--bg-body); transition: var(--transition); }
        .admin-table tr:hover { transform: scale(1.01); }
        .admin-table td { padding: 15px; }
        .admin-table td:first-child { border-radius: 12px 0 0 12px; }
        .admin-table td:last-child { border-radius: 0 12px 12px 0; }
        .table-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
        .btn-action { width: 35px; height: 35px; border-radius: 8px; border: none; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; justify-content: center; }
        .btn-edit { background: #e0f2fe; color: #0284c7; }
        .btn-delete { background: #fee2e2; color: #dc2626; }
        .btn-edit:hover { background: #0284c7; color: white; }
        .btn-delete:hover { background: #dc2626; color: white; }
        
        @media (max-width: 992px) { .admin-main { grid-template-columns: 1fr; } .form-card { position: static; } }
    </style>
</head>
<body class="admin-body">

    <header>
        <div class="header-content">
            <div class="logo">
                <h1>Admin <span>Dashboard</span></h1>
            </div>
            <div class="header-actions">
                <a href="index.html" class="add-to-cart" style="text-decoration: none; padding: 10px 20px; font-size: 0.9rem;">
                    <i class="fa-solid fa-eye"></i> View Menu
                </a>
            </div>
        </div>
    </header>

    <div class="admin-page">
        <!-- Stats Section -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="stat-card">
                <p style="opacity: 0.8; font-weight: 500;">Total Delicacies</p>
                <h2 id="stat-total" style="font-size: 2.5rem; font-weight: 900;">0</h2>
                <i class="fa-solid fa-burger" style="position: absolute; right: 20px; bottom: 20px; font-size: 3rem; opacity: 0.2;"></i>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #ffcc00, #ff8c00);">
                <p style="opacity: 0.8; font-weight: 500;">Menu Categories</p>
                <h2 id="stat-cats" style="font-size: 2.5rem; font-weight: 900;">4</h2>
                <i class="fa-solid fa-list" style="position: absolute; right: 20px; bottom: 20px; font-size: 3rem; opacity: 0.2;"></i>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #4ade80, #22c55e);">
                <p style="opacity: 0.8; font-weight: 500;">Status</p>
                <h2 style="font-size: 2.5rem; font-weight: 900;">Live</h2>
                <i class="fa-solid fa-circle-check" style="position: absolute; right: 20px; bottom: 20px; font-size: 3rem; opacity: 0.2;"></i>
            </div>
        </div>

        <div class="admin-main">
            <!-- Sidebar: Form -->
            <div class="food-card form-card" style="padding: 25px;">
                <h3 style="margin-bottom: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px;">
                    <i class="fa-solid fa-pen-to-square" style="color: var(--primary);"></i>
                    <span id="form-title">Add New Item</span>
                </h3>
                
                <form id="menu-form">
                    <input type="hidden" id="edit-id">
                    
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); margin-bottom: 5px;">ITEM NAME</label>
                        <input type="text" id="item-name" placeholder="e.g. Cheese Burst Pizza" 
                               style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none;" required>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                        <div>
                            <label style="display: block; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); margin-bottom: 5px;">PRICE (₹)</label>
                            <input type="number" id="item-price" placeholder="99" 
                                   style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none;" required>
                        </div>
                        <div>
                            <label style="display: block; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); margin-bottom: 5px;">CATEGORY</label>
                            <select id="item-category" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none;" required>
                                <option value="Breakfast">Breakfast</option>
                                <option value="Lunch">Lunch</option>
                                <option value="Snacks">Snacks</option>
                                <option value="Beverages & Drinks">Beverages & Drinks</option>
                            </select>
                        </div>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); margin-bottom: 5px;">IMAGE URL</label>
                        <input type="url" id="item-image" placeholder="https://unsplash.com/..." 
                               style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none;" required>
                        <div class="img-preview-box" id="img-preview">
                            <span style="color: #999; font-size: 0.8rem;">Image Preview</span>
                        </div>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); margin-bottom: 5px;">DESCRIPTION</label>
                        <textarea id="item-desc" rows="3" placeholder="Describe the taste..." 
                                  style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none; resize: none;" required></textarea>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button type="submit" id="save-btn" class="add-to-cart" style="flex: 2; background: var(--primary); color: white;">Save Item</button>
                        <button type="button" id="cancel-btn" style="flex: 1; display: none; background: #666; color: white; border: none; border-radius: 12px; cursor: pointer;">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Main: Table -->
            <div class="table-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                    <h3 style="font-weight: 800;">Current Live Menu</h3>
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <button onclick="resetForm(); window.scrollTo({top: 0, behavior: 'smooth'})" 
                                style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer;">
                            <i class="fa-solid fa-plus"></i> Add New Food
                        </button>
                        <button onclick="resetMenu()" style="border: none; background: none; color: var(--accent); cursor: pointer; font-weight: 600; font-size: 0.85rem;">
                            <i class="fa-solid fa-rotate"></i> Reset Defaults
                        </button>
                    </div>
                </div>
                
                <div style="overflow-x: auto;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ITEM</th>
                                <th>CATEGORY</th>
                                <th>PRICE</th>
                                <th>ACTIONS</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body">
                            <!-- Rows injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Notifications -->
    <div id="toast-container"></div>

    <script src="admin.js"></script>
</body>
</html>
